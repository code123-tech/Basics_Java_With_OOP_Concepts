<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" width="860" height="380" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="860" height="380" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#e2e8f0">Virtual Thread: Mount / Unmount Lifecycle</text>
  <text x="430" y="57" text-anchor="middle" font-size="13" fill="#94a3b8">Carrier thread is freed the moment a virtual thread blocks — then reassigned</text>

  <!-- ─── TIMELINE TRACK ─── -->
  <line x1="60" y1="200" x2="800" y2="200" stroke="#334155" stroke-width="2"/>

  <!-- Arrow at end -->
  <polygon points="800,194 814,200 800,206" fill="#475569"/>
  <text x="820" y="204" font-size="11" fill="#64748b">time</text>

  <!-- ─── SEGMENT 1: CPU Work ─── -->
  <!-- Block -->
  <rect x="60" y="160" width="120" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="186" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">CPU Work</text>
  <text x="120" y="202" text-anchor="middle" font-size="10" fill="#60a5fa">Mounted on</text>
  <text x="120" y="216" text-anchor="middle" font-size="10" fill="#60a5fa">Carrier T-1</text>
  <text x="120" y="232" text-anchor="middle" font-size="9"  fill="#3b82f6">~5ms</text>

  <!-- Carrier label above -->
  <text x="120" y="148" text-anchor="middle" font-size="10" fill="#22c55e">▲ Carrier T-1 active</text>

  <!-- ─── UNMOUNT ARROW ─── -->
  <line x1="180" y1="180" x2="242" y2="148" stroke="#f97316" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <text x="210" y="162" text-anchor="middle" font-size="10" fill="#f97316">unmount</text>

  <!-- ─── SEGMENT 2: Parked (I/O wait) ─── -->
  <rect x="242" y="140" width="150" height="44" rx="8" fill="#1c1c1c" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="317" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#9ca3af">Parked on Heap</text>
  <text x="317" y="176" text-anchor="middle" font-size="10" fill="#6b7280">waiting for DB… 200ms</text>

  <!-- Carrier freed label -->
  <text x="317" y="230" text-anchor="middle" font-size="10" fill="#22c55e">Carrier T-1 freed → runs other VTs</text>
  <line x1="317" y1="218" x2="317" y2="200" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Other VTs running meanwhile -->
  <rect x="250" y="252" width="130" height="32" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="315" y="266" text-anchor="middle" font-size="10" fill="#86efac">Carrier T-1 now runs</text>
  <text x="315" y="279" text-anchor="middle" font-size="10" fill="#4ade80">VT-42, VT-99, VT-200…</text>

  <!-- ─── MOUNT ARROW ─── -->
  <line x1="392" y1="148" x2="452" y2="175" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="420" y="155" text-anchor="middle" font-size="10" fill="#60a5fa">re-mount</text>
  <text x="420" y="167" text-anchor="middle" font-size="9" fill="#60a5fa">(any carrier)</text>

  <!-- ─── SEGMENT 3: CPU Work again ─── -->
  <rect x="452" y="160" width="120" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="512" y="186" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">CPU Work</text>
  <text x="512" y="202" text-anchor="middle" font-size="10" fill="#60a5fa">Re-mounted on</text>
  <text x="512" y="216" text-anchor="middle" font-size="10" fill="#60a5fa">Carrier T-3</text>
  <text x="512" y="232" text-anchor="middle" font-size="9"  fill="#3b82f6">~2ms</text>

  <text x="512" y="148" text-anchor="middle" font-size="10" fill="#22c55e">▲ Carrier T-3 active</text>

  <!-- ─── UNMOUNT 2 ─── -->
  <line x1="572" y1="180" x2="632" y2="148" stroke="#f97316" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <text x="605" y="162" text-anchor="middle" font-size="10" fill="#f97316">unmount</text>

  <!-- ─── SEGMENT 4: Parked again ─── -->
  <rect x="632" y="140" width="110" height="44" rx="8" fill="#1c1c1c" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="687" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#9ca3af">Parked Again</text>
  <text x="687" y="176" text-anchor="middle" font-size="10" fill="#6b7280">waiting API…</text>

  <!-- ─── SEGMENT 5: Complete ─── -->
  <!-- mount arrow -->
  <line x1="742" y1="160" x2="770" y2="175" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>

  <rect x="742" y="160" width="50" height="44" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="767" y="178" text-anchor="middle" font-size="9" font-weight="bold" fill="#86efac">Done</text>
  <text x="767" y="192" text-anchor="middle" font-size="8" fill="#4ade80">✓</text>

  <!-- ─── KEY INSIGHT BOX ─── -->
  <rect x="60" y="310" width="740" height="52" rx="10" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="430" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="#a5b4fc">🔑 Key Insight</text>
  <text x="430" y="350" text-anchor="middle" font-size="11" fill="#818cf8">The virtual thread may re-mount on a DIFFERENT carrier after unparking — the JVM picks any available carrier.</text>

  <!-- Defs -->
  <defs>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>
