<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" width="860" height="460" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="860" height="460" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#e2e8f0">Virtual Threads Architecture</text>
  <text x="430" y="60" text-anchor="middle" font-size="13" fill="#94a3b8">Millions of virtual threads → handful of carrier threads → OS threads</text>

  <!-- ── LAYER 1: Virtual Threads ── -->
  <rect x="30" y="80" width="800" height="120" rx="12" fill="#0c1a2e" stroke="#1e40af" stroke-width="1.5"/>
  <text x="430" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#93c5fd">Virtual Threads (JVM-managed, lightweight — heap objects)</text>

  <!-- VT boxes row 1 -->
  <!-- VT1 active -->
  <rect x="50"  y="108" width="90" height="38" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="95"  y="123" text-anchor="middle" font-size="10" font-weight="bold" fill="#93c5fd">VT-1</text>
  <text x="95"  y="138" text-anchor="middle" font-size="9"  fill="#60a5fa">▶ Running</text>

  <!-- VT2 parked -->
  <rect x="152" y="108" width="90" height="38" rx="6" fill="#1c2a1c" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="197" y="123" text-anchor="middle" font-size="10" font-weight="bold" fill="#9ca3af">VT-2</text>
  <text x="197" y="138" text-anchor="middle" font-size="9"  fill="#6b7280">⏸ Parked</text>

  <!-- VT3 active -->
  <rect x="254" y="108" width="90" height="38" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="299" y="123" text-anchor="middle" font-size="10" font-weight="bold" fill="#93c5fd">VT-3</text>
  <text x="299" y="138" text-anchor="middle" font-size="9"  fill="#60a5fa">▶ Running</text>

  <!-- VT4 parked -->
  <rect x="356" y="108" width="90" height="38" rx="6" fill="#1c2a1c" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="401" y="123" text-anchor="middle" font-size="10" font-weight="bold" fill="#9ca3af">VT-4</text>
  <text x="401" y="138" text-anchor="middle" font-size="9"  fill="#6b7280">⏸ Parked</text>

  <!-- VT5 active -->
  <rect x="458" y="108" width="90" height="38" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="503" y="123" text-anchor="middle" font-size="10" font-weight="bold" fill="#93c5fd">VT-5</text>
  <text x="503" y="138" text-anchor="middle" font-size="9"  fill="#60a5fa">▶ Running</text>

  <!-- VT6 parked -->
  <rect x="560" y="108" width="90" height="38" rx="6" fill="#1c2a1c" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="605" y="123" text-anchor="middle" font-size="10" font-weight="bold" fill="#9ca3af">VT-6</text>
  <text x="605" y="138" text-anchor="middle" font-size="9"  fill="#6b7280">⏸ Parked</text>

  <!-- VT7 active -->
  <rect x="662" y="108" width="90" height="38" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="707" y="123" text-anchor="middle" font-size="10" font-weight="bold" fill="#93c5fd">VT-7</text>
  <text x="707" y="138" text-anchor="middle" font-size="9"  fill="#60a5fa">▶ Running</text>

  <!-- "...millions more" label -->
  <rect x="764" y="108" width="56" height="38" rx="6" fill="#111827" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="792" y="127" text-anchor="middle" font-size="10" fill="#6b7280">+millions</text>
  <text x="792" y="140" text-anchor="middle" font-size="9"  fill="#4b5563">parked</text>

  <!-- Legend row 1 -->
  <rect x="50" y="155" width="12" height="12" rx="2" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="67" y="165" font-size="10" fill="#93c5fd">Mounted (active on carrier)</text>
  <rect x="250" y="155" width="12" height="12" rx="2" fill="#1c2a1c" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="267" y="165" font-size="10" fill="#9ca3af">Parked (waiting, stored on heap — ~KB only)</text>

  <!-- ── ARROWS Layer 1 → Layer 2 (only active VTs) ── -->
  <!-- VT1 → CT1 -->
  <line x1="95"  y1="210" x2="95"  y2="246" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrowBlue)"/>
  <!-- VT3 → CT2 -->
  <line x1="299" y1="210" x2="299" y2="246" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrowBlue)"/>
  <!-- VT5 → CT3 -->
  <line x1="503" y1="210" x2="503" y2="246" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrowBlue)"/>
  <!-- VT7 → CT4 -->
  <line x1="707" y1="210" x2="707" y2="246" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

  <!-- mount label -->
  <text x="200" y="235" text-anchor="middle" font-size="10" fill="#60a5fa">mount →</text>
  <text x="605" y="235" text-anchor="middle" font-size="10" fill="#60a5fa">mount →</text>

  <!-- ── LAYER 2: Carrier Threads ── -->
  <rect x="30" y="246" width="800" height="100" rx="12" fill="#0d1f0d" stroke="#166534" stroke-width="1.5"/>
  <text x="430" y="266" text-anchor="middle" font-size="13" font-weight="bold" fill="#86efac">Carrier Threads (Platform Threads — one per CPU core)</text>

  <!-- CT boxes — only 4 -->
  <rect x="50"  y="276" width="140" height="48" rx="7" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="120" y="296" text-anchor="middle" font-size="11" font-weight="bold" fill="#86efac">Carrier Thread 1</text>
  <text x="120" y="312" text-anchor="middle" font-size="10" fill="#4ade80">running VT-1</text>

  <rect x="230" y="276" width="140" height="48" rx="7" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="300" y="296" text-anchor="middle" font-size="11" font-weight="bold" fill="#86efac">Carrier Thread 2</text>
  <text x="300" y="312" text-anchor="middle" font-size="10" fill="#4ade80">running VT-3</text>

  <rect x="490" y="276" width="140" height="48" rx="7" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="560" y="296" text-anchor="middle" font-size="11" font-weight="bold" fill="#86efac">Carrier Thread 3</text>
  <text x="560" y="312" text-anchor="middle" font-size="10" fill="#4ade80">running VT-5</text>

  <rect x="670" y="276" width="140" height="48" rx="7" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="740" y="296" text-anchor="middle" font-size="11" font-weight="bold" fill="#86efac">Carrier Thread 4</text>
  <text x="740" y="312" text-anchor="middle" font-size="10" fill="#4ade80">running VT-7</text>

  <!-- note: typically = cpu cores -->
  <text x="430" y="335" text-anchor="middle" font-size="10" fill="#4ade80">Typically: number of carrier threads = available CPU cores (e.g. 8 cores = 8 carriers)</text>

  <!-- ── ARROWS Layer 2 → Layer 3 ── -->
  <line x1="120" y1="370" x2="120" y2="396" stroke="#22c55e" stroke-width="1.8" marker-end="url(#arrowGreen)"/>
  <line x1="300" y1="370" x2="300" y2="396" stroke="#22c55e" stroke-width="1.8" marker-end="url(#arrowGreen)"/>
  <line x1="560" y1="370" x2="560" y2="396" stroke="#22c55e" stroke-width="1.8" marker-end="url(#arrowGreen)"/>
  <line x1="740" y1="370" x2="740" y2="396" stroke="#22c55e" stroke-width="1.8" marker-end="url(#arrowGreen)"/>

  <!-- ── LAYER 3: OS Threads ── -->
  <rect x="30" y="396" width="800" height="50" rx="12" fill="#1a1006" stroke="#d97706" stroke-width="1.5"/>
  <text x="430" y="416" text-anchor="middle" font-size="13" font-weight="bold" fill="#fbbf24">OS Threads / CPU Cores</text>
  <text x="430" y="434" text-anchor="middle" font-size="11" fill="#d97706">OS only sees carrier threads — virtual threads are invisible to the OS</text>

  <!-- Defs -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
