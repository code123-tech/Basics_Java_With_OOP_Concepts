<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="860" height="420" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#e2e8f0">Platform Threads: The Scalability Wall</text>
  <text x="430" y="60" text-anchor="middle" font-size="13" fill="#94a3b8">Each platform thread maps 1:1 to an OS thread — blocking = wasted resource</text>

  <!-- ── LEFT PANEL: Your App ── -->
  <rect x="30" y="80" width="220" height="300" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="140" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#7dd3fc">Your Application</text>

  <!-- Platform Thread boxes -->
  <!-- Thread 1: working -->
  <rect x="50" y="115" width="180" height="44" rx="7" fill="#166534" stroke="#22c55e" stroke-width="1.5"/>
  <text x="90" y="133" font-size="11" font-weight="bold" fill="#86efac">Platform Thread 1</text>
  <text x="90" y="149" font-size="10" fill="#4ade80">● Executing (CPU work)</text>

  <!-- Thread 2: blocked DB -->
  <rect x="50" y="169" width="180" height="44" rx="7" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="90" y="187" font-size="11" font-weight="bold" fill="#fdba74">Platform Thread 2</text>
  <text x="90" y="203" font-size="10" fill="#fb923c">⏳ Blocked — waiting DB</text>

  <!-- Thread 3: blocked API -->
  <rect x="50" y="223" width="180" height="44" rx="7" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="90" y="241" font-size="11" font-weight="bold" fill="#fdba74">Platform Thread 3</text>
  <text x="90" y="257" font-size="10" fill="#fb923c">⏳ Blocked — waiting API</text>

  <!-- Thread 4: blocked -->
  <rect x="50" y="277" width="180" height="44" rx="7" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="90" y="295" font-size="11" font-weight="bold" fill="#fdba74">Platform Thread 4</text>
  <text x="90" y="311" font-size="10" fill="#fb923c">⏳ Blocked — waiting I/O</text>

  <!-- Pending queue -->
  <rect x="50" y="330" width="180" height="36" rx="7" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="140" y="353" text-anchor="middle" font-size="11" fill="#a5b4fc">+ 9,996 tasks queuing...</text>

  <!-- ── ARROWS App → OS ── -->
  <!-- Arrow 1 (green - working) -->
  <line x1="250" y1="137" x2="310" y2="137" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <!-- Arrow 2 (orange - blocked) -->
  <line x1="250" y1="191" x2="310" y2="191" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <!-- Arrow 3 (orange - blocked) -->
  <line x1="250" y1="245" x2="310" y2="245" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <!-- Arrow 4 (orange - blocked) -->
  <line x1="250" y1="299" x2="310" y2="299" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- ── MIDDLE PANEL: OS Threads ── -->
  <rect x="310" y="80" width="200" height="300" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="410" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#7dd3fc">OS Threads (1:1)</text>

  <!-- OS Thread 1 -->
  <rect x="330" y="115" width="160" height="44" rx="7" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="410" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#86efac">OS Thread 1</text>
  <text x="410" y="149" text-anchor="middle" font-size="10" fill="#4ade80">Running</text>

  <!-- OS Thread 2 -->
  <rect x="330" y="169" width="160" height="44" rx="7" fill="#431407" stroke="#f97316" stroke-width="1.5"/>
  <text x="410" y="187" text-anchor="middle" font-size="11" font-weight="bold" fill="#fdba74">OS Thread 2</text>
  <text x="410" y="203" text-anchor="middle" font-size="10" fill="#fb923c">Occupied &amp; Idle 😴</text>

  <!-- OS Thread 3 -->
  <rect x="330" y="223" width="160" height="44" rx="7" fill="#431407" stroke="#f97316" stroke-width="1.5"/>
  <text x="410" y="241" text-anchor="middle" font-size="11" font-weight="bold" fill="#fdba74">OS Thread 3</text>
  <text x="410" y="257" text-anchor="middle" font-size="10" fill="#fb923c">Occupied &amp; Idle 😴</text>

  <!-- OS Thread 4 -->
  <rect x="330" y="277" width="160" height="44" rx="7" fill="#431407" stroke="#f97316" stroke-width="1.5"/>
  <text x="410" y="295" text-anchor="middle" font-size="11" font-weight="bold" fill="#fdba74">OS Thread 4</text>
  <text x="410" y="311" text-anchor="middle" font-size="10" fill="#fb923c">Occupied &amp; Idle 😴</text>

  <!-- Memory cost label -->
  <rect x="330" y="330" width="160" height="36" rx="7" fill="#1c1917" stroke="#78716c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="410" y="353" text-anchor="middle" font-size="11" fill="#a8a29e">~1–2 MB stack each</text>

  <!-- ── ARROW MIDDLE → RIGHT ── -->
  <line x1="510" y1="230" x2="570" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- ── RIGHT PANEL: Problem Summary ── -->
  <rect x="570" y="80" width="260" height="300" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="700" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#f87171">The Problems</text>

  <!-- Problem 1 -->
  <rect x="588" y="115" width="224" height="58" rx="7" fill="#2d1515" stroke="#ef4444" stroke-width="1"/>
  <text x="700" y="134" text-anchor="middle" font-size="12" font-weight="bold" fill="#fca5a5">Memory Bloat</text>
  <text x="700" y="150" text-anchor="middle" font-size="11" fill="#fca5a5">10,000 threads</text>
  <text x="700" y="165" text-anchor="middle" font-size="11" fill="#ef4444">≈ 10–20 GB stack memory</text>

  <!-- Problem 2 -->
  <rect x="588" y="183" width="224" height="58" rx="7" fill="#2d1515" stroke="#ef4444" stroke-width="1"/>
  <text x="700" y="202" text-anchor="middle" font-size="12" font-weight="bold" fill="#fca5a5">Wasted OS Resources</text>
  <text x="700" y="218" text-anchor="middle" font-size="11" fill="#fca5a5">Blocked threads still hold</text>
  <text x="700" y="233" text-anchor="middle" font-size="11" fill="#ef4444">their OS thread (doing nothing)</text>

  <!-- Problem 3 -->
  <rect x="588" y="251" width="224" height="58" rx="7" fill="#2d1515" stroke="#ef4444" stroke-width="1"/>
  <text x="700" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#fca5a5">OOM Crash</text>
  <text x="700" y="286" text-anchor="middle" font-size="11" fill="#fca5a5">OutOfMemoryError:</text>
  <text x="700" y="301" text-anchor="middle" font-size="11" fill="#ef4444">unable to create native thread</text>

  <!-- Bottom label -->
  <rect x="588" y="319" width="224" height="47" rx="7" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="700" y="337" text-anchor="middle" font-size="11" fill="#a5b4fc">With pool of 8 threads</text>
  <text x="700" y="352" text-anchor="middle" font-size="11" fill="#818cf8">10k tasks × 10ms =</text>
  <text x="700" y="366" text-anchor="middle" font-size="12" font-weight="bold" fill="#6366f1">~12,500ms wait time</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
