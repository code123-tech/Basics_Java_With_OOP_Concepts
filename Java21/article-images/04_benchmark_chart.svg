<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" width="860" height="460" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="860" height="460" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#e2e8f0">Benchmark: Platform Threads vs Virtual Threads</text>
  <text x="430" y="57" text-anchor="middle" font-size="13" fill="#94a3b8">Mixed workload: CPU (sum of primes) + 10ms blocking I/O per task</text>

  <!-- ── Chart area ── -->
  <!-- Y axis -->
  <line x1="120" y1="80" x2="120" y2="360" stroke="#334155" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="120" y1="360" x2="780" y2="360" stroke="#334155" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="30" y="230" text-anchor="middle" font-size="12" fill="#94a3b8" transform="rotate(-90 30 230)">Time (seconds)</text>

  <!-- Y axis ticks + gridlines -->
  <!-- 0 -->
  <line x1="115" y1="360" x2="780" y2="360" stroke="#1e293b" stroke-width="1"/>
  <text x="110" y="364" text-anchor="end" font-size="11" fill="#64748b">0</text>

  <!-- 60 -->
  <line x1="115" y1="300" x2="780" y2="300" stroke="#1e293b" stroke-width="1"/>
  <text x="110" y="304" text-anchor="end" font-size="11" fill="#64748b">60</text>

  <!-- 120 -->
  <line x1="115" y1="240" x2="780" y2="240" stroke="#1e293b" stroke-width="1"/>
  <text x="110" y="244" text-anchor="end" font-size="11" fill="#64748b">120</text>

  <!-- 180 -->
  <line x1="115" y1="180" x2="780" y2="180" stroke="#1e293b" stroke-width="1"/>
  <text x="110" y="184" text-anchor="end" font-size="11" fill="#64748b">180</text>

  <!-- 240 -->
  <line x1="115" y1="120" x2="780" y2="120" stroke="#1e293b" stroke-width="1"/>
  <text x="110" y="124" text-anchor="end" font-size="11" fill="#64748b">240</text>

  <!-- 300 -->
  <line x1="115" y1="80" x2="780" y2="80" stroke="#1e293b" stroke-width="1"/>
  <text x="110" y="84" text-anchor="end" font-size="11" fill="#64748b">300s</text>

  <!-- ── GROUP 1: 10,000 tasks ── -->
  <!-- Group label -->
  <text x="265" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#cbd5e1">10,000 Tasks</text>

  <!-- Platform bar: ~51s → 51/300 * 280 = 47.6px height -->
  <rect x="160" y="312" width="80" height="48" rx="4" fill="#f97316" opacity="0.9"/>
  <text x="200" y="308" text-anchor="middle" font-size="11" font-weight="bold" fill="#fed7aa">51s</text>

  <!-- Virtual bar: ~0.8s → too small, show as 4px + label -->
  <rect x="280" y="356" width="80" height="4" rx="2" fill="#22c55e" opacity="0.9"/>
  <text x="320" y="350" text-anchor="middle" font-size="11" font-weight="bold" fill="#86efac">&lt;1s</text>

  <!-- ── GROUP 2: 100,000 tasks ── -->
  <text x="590" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#cbd5e1">100,000 Tasks</text>

  <!-- Platform bar: ~480s  (capped at chart top, show overflow) -->
  <!-- We'll show a "clipped" bar with overflow arrow -->
  <rect x="480" y="80" width="80" height="280" rx="4" fill="#f97316" opacity="0.9"/>
  <!-- Overflow zigzag at top -->
  <polyline points="480,80 500,68 520,80 540,68 560,80" fill="none" stroke="#f97316" stroke-width="2"/>
  <text x="520" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#fed7aa">~480s</text>
  <text x="520" y="71" text-anchor="middle" font-size="9" fill="#fb923c">(8 min+)</text>

  <!-- Virtual bar: ~60s → 60/300 * 280 = 56px -->
  <rect x="600" y="304" width="80" height="56" rx="4" fill="#22c55e" opacity="0.9"/>
  <text x="640" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="#86efac">~60s</text>

  <!-- ── X axis labels (thread types) ── -->
  <text x="200" y="400" text-anchor="middle" font-size="10" fill="#f97316">Platform</text>
  <text x="200" y="412" text-anchor="middle" font-size="10" fill="#f97316">Threads</text>
  <text x="320" y="400" text-anchor="middle" font-size="10" fill="#22c55e">Virtual</text>
  <text x="320" y="412" text-anchor="middle" font-size="10" fill="#22c55e">Threads</text>

  <text x="520" y="400" text-anchor="middle" font-size="10" fill="#f97316">Platform</text>
  <text x="520" y="412" text-anchor="middle" font-size="10" fill="#f97316">Threads</text>
  <text x="640" y="400" text-anchor="middle" font-size="10" fill="#22c55e">Virtual</text>
  <text x="640" y="412" text-anchor="middle" font-size="10" fill="#22c55e">Threads</text>

  <!-- ── Legend ── -->
  <rect x="660" y="88" width="14" height="14" rx="3" fill="#f97316"/>
  <text x="680" y="100" font-size="11" fill="#fed7aa">Platform Threads (fixed pool = CPU cores)</text>
  <rect x="660" y="110" width="14" height="14" rx="3" fill="#22c55e"/>
  <text x="680" y="122" font-size="11" fill="#86efac">Virtual Threads (newVirtualThreadPerTaskExecutor)</text>

  <!-- ── Speedup callout ── -->
  <rect x="130" y="418" width="590" height="32" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="425" y="431" text-anchor="middle" font-size="11" fill="#a5b4fc">Speedup: </text>
  <text x="510" y="431" text-anchor="middle" font-size="11" font-weight="bold" fill="#818cf8">10,000 tasks → ~51× faster   |   100,000 tasks → ~8× faster</text>
  <text x="425" y="444" text-anchor="middle" font-size="10" fill="#6366f1">Platform pool size = Runtime.getRuntime().availableProcessors()</text>
</svg>
